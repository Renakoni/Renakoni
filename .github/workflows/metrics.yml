name: Rich Code Statistics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          
          # 保留一个最基础的头部（包含你的名字和一点基础排版，让整个图表有边框、不突兀）
          base: header
          
          # ========================================
          # 1. 代码行数与历史趋势 (折线图+柱状图)
          # ========================================
          plugin_lines: yes
          plugin_lines_sections: base, repositories, history
          
          # ========================================
          # 2. 编程语言统计 (环形图/进度条)
          # ========================================
          plugin_languages: yes
          # 显示各个语言的实际大小(bytes)和百分比
          plugin_languages_details: bytes-size, percentage
          # 最多展示 8 种你最常用的语言
          plugin_languages_limit: 8
          
          # ========================================
          # 3. 编程习惯与活跃时间 (打卡热力图)
          # ========================================
          plugin_habits: yes
          plugin_habits_charts: yes # 开启图表
          plugin_habits_facts: yes  # 开启有趣的总结（比如“你是夜猫子”）
          plugin_habits_days: 14    # 统计最近 14 天的精细习惯
          
          # 重新命个名
          filename: rich-statistics.svg
